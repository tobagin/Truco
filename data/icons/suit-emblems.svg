<svg xmlns="http://www.w3.org/2000/svg" width="256" height="80" viewBox="0 0 256 80">
  <defs>
    <linearGradient id="steelL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bcd8fb"/>
      <stop offset="1" stop-color="#6f9ce8"/>
    </linearGradient>
    <linearGradient id="steelR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7fd6"/>
      <stop offset="1" stop-color="#2a4f9e"/>
    </linearGradient>
    <radialGradient id="gold" cx="0.38" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ffe9a6"/>
      <stop offset="0.55" stop-color="#f3bb46"/>
      <stop offset="1" stop-color="#cd8a1d"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0655b"/>
      <stop offset="1" stop-color="#c12f2b"/>
    </linearGradient>
    <linearGradient id="woodL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c98a52"/>
      <stop offset="1" stop-color="#9a5a2e"/>
    </linearGradient>
    <linearGradient id="woodR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a5a2e"/>
      <stop offset="1" stop-color="#6f3d1d"/>
    </linearGradient>
  </defs>

  <!-- ESPADA (sword) -->
  <g transform="translate(32 40) scale(0.62)">
    <path d="M0 -38 L5 -24 L4 16 L0 16 Z" fill="url(#steelR)"/>
    <path d="M0 -38 L-5 -24 L-4 16 L0 16 Z" fill="url(#steelL)"/>
    <path d="M0 -38 L0 16" stroke="#e8f1ff" stroke-width="1" opacity="0.7"/>
    <path d="M-15 18 Q-19 18 -19 14 Q-19 11 -15 12 L15 12 Q19 11 19 14 Q19 18 15 18 Q11 18 9 15 L-9 15 Q-11 18 -15 18 Z" fill="url(#gold)" stroke="#b9781b" stroke-width="1"/>
    <rect x="-3.4" y="15" width="6.8" height="17" rx="2.4" fill="url(#woodR)"/>
    <path d="M-3.4 19 L3.4 17 M-3.4 23 L3.4 21 M-3.4 27 L3.4 25" stroke="#6f3d1d" stroke-width="1.4"/>
    <circle cx="0" cy="36" r="4.4" fill="url(#gold)" stroke="#b9781b" stroke-width="1"/>
    <circle cx="0" cy="36" r="1.8" fill="url(#red)"/>
  </g>

  <!-- ORO (coin) -->
  <g transform="translate(96 40)">
    <circle r="24" fill="url(#gold)" stroke="#b9781b" stroke-width="2.4"/>
    <circle r="17.5" fill="none" stroke="#b9781b" stroke-width="1.4" opacity="0.55"/>
    <g fill="#cd8a1d" opacity="0.7">
      <circle cx="0" cy="-21" r="1.5"/><circle cx="15" cy="-15" r="1.5"/><circle cx="21" cy="0" r="1.5"/>
      <circle cx="15" cy="15" r="1.5"/><circle cx="0" cy="21" r="1.5"/><circle cx="-15" cy="15" r="1.5"/>
      <circle cx="-21" cy="0" r="1.5"/><circle cx="-15" cy="-15" r="1.5"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="url(#gold)" stroke="#b9781b" stroke-width="1.2"/>
    <circle cx="-7" cy="-7" r="5" fill="#fff4d2" opacity="0.8"/>
  </g>

  <!-- COPA (cup) -->
  <g transform="translate(160 40)">
    <path d="M-19 -22 Q-19 -4 0 2 Q19 -4 19 -22 Z" fill="url(#gold)" stroke="#b9781b" stroke-width="1.6"/>
    <ellipse cx="0" cy="-22" rx="19" ry="4.5" fill="url(#red)" stroke="#b9781b" stroke-width="1.4"/>
    <circle cx="0" cy="-12" r="4.5" fill="url(#red)"/>
    <rect x="-3" y="2" width="6" height="13" fill="url(#gold)" stroke="#b9781b" stroke-width="1"/>
    <path d="M-14 26 L-11 16 H11 L14 26 Z" fill="url(#gold)" stroke="#b9781b" stroke-width="1.4"/>
  </g>

  <!-- BASTO (club) -->
  <g transform="translate(224 40)">
    <path d="M-4 28 L-8 -12 Q-10 -28 0 -28 Q10 -28 8 -12 L4 28 Z" fill="url(#woodR)" stroke="#5a3217" stroke-width="1.4"/>
    <path d="M-4 28 L-8 -12 Q-10 -28 0 -28 L0 28 Z" fill="url(#woodL)"/>
    <g fill="#5a3217" opacity="0.6">
      <ellipse cx="1" cy="-18" rx="2.8" ry="1.9"/>
      <ellipse cx="-2" cy="0" rx="2.5" ry="1.7"/>
      <ellipse cx="1" cy="16" rx="2.2" ry="1.5"/>
    </g>
    <path d="M-3 -20 L-4 24" stroke="#dba368" stroke-width="1.6" opacity="0.6"/>
  </g>
</svg>
