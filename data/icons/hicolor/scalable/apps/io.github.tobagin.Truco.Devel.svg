<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background (orange for development) -->
  <rect width="128" height="128" rx="16" fill="#ff7800"/>

  <!-- Playing card icon -->
  <rect x="24" y="32" width="80" height="64" rx="8" fill="#ffffff"/>
  <rect x="28" y="36" width="72" height="56" rx="6" fill="#f6f5f4"/>

  <!-- Card symbols (spades) -->
  <path d="M 64 48
           C 64 48 56 54 56 60
           C 56 64 58 66 62 66
           C 60 68 60 70 62 72
           L 66 72
           L 66 72
           L 62 72
           C 60 70 60 68 62 66
           C 58 66 56 64 56 60
           C 56 54 64 48 64 48
           M 64 48
           C 64 48 72 54 72 60
           C 72 64 70 66 66 66
           C 68 68 68 70 66 72
           L 62 72"
        fill="#e66100" stroke="none"/>

  <!-- Letter T -->
  <text x="64" y="88" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle" fill="#e66100">T</text>

  <!-- DEV badge -->
  <rect x="88" y="8" width="32" height="16" rx="4" fill="#c64600"/>
  <text x="104" y="19" font-family="sans-serif" font-size="10" font-weight="bold"
        text-anchor="middle" fill="#ffffff">DEV</text>
</svg>
