<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6ebf3"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8be0"/>
      <stop offset="0.5" stop-color="#3f74d6"/>
      <stop offset="1" stop-color="#2c57ad"/>
    </linearGradient>
    <radialGradient id="gold" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#ffe6a0"/>
      <stop offset="0.6" stop-color="#f0b443"/>
      <stop offset="1" stop-color="#cf8a23"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8584f"/>
      <stop offset="1" stop-color="#c5322e"/>
    </linearGradient>
  </defs>

  <g transform="translate(25.5 -23.5) rotate(-22 64 118)">
    <!-- back card: copa (red) -->
    <g transform="rotate(-2 46 116)">
      <rect x="21" y="38" width="50" height="78" rx="7" fill="#ccd3e0"/>
      <rect x="22.1" y="39.1" width="47.8" height="75.8" rx="6" fill="url(#face)"/>
      <g transform="translate(33 53)">
        <path d="M-6 -5 H6 A6 6 0 0 1 0 3 A6 6 0 0 1 -6 -5 Z" fill="url(#red)"/>
        <rect x="-1.2" y="2.5" width="2.4" height="5" fill="url(#red)"/>
        <rect x="-4.5" y="7" width="9" height="2.6" rx="1.3" fill="url(#red)"/>
      </g>
    </g>

    <!-- middle card: oro (gold) -->
    <g transform="rotate(15 46 116)">
      <rect x="21" y="38" width="50" height="78" rx="7" fill="#ccd3e0"/>
      <rect x="22.1" y="39.1" width="47.8" height="75.8" rx="6" fill="url(#face)"/>
      <g transform="translate(33 53)">
        <circle r="6.4" fill="url(#gold)" stroke="#b9781b" stroke-width="1.4"/>
        <circle r="3.4" fill="none" stroke="#b9781b" stroke-width="1" opacity="0.6"/>
      </g>
    </g>

    <!-- front card: espada (blue) with hero sword -->
    <g transform="rotate(32 46 116)">
      <rect x="21" y="38" width="50" height="78" rx="7" fill="#ccd3e0"/>
      <rect x="22.1" y="39.1" width="47.8" height="75.8" rx="6" fill="url(#face)"/>
      <g transform="translate(32 53)">
        <path d="M0 -7 L3 -1 L2.4 9 L-2.4 9 L-3 -1 Z" fill="url(#steel)"/>
        <rect x="-5.5" y="8" width="11" height="2.6" rx="1.3" fill="#e7b53f"/>
      </g>
      <g transform="translate(46 76) scale(0.84)">
        <path d="M0 -30 L5 -17 L4 19 L-4 19 L-5 -17 Z" fill="#3f74d6"/>
        <path d="M0 -30 L0 19 L-4 19 L-5 -17 Z" fill="#6f9bea"/>
        <path d="M0 -30 L0 19 L4 19 L5 -17 Z" fill="#2b5099"/>
        <rect x="-14" y="18" width="28" height="6" rx="3" fill="url(#gold)" stroke="#b9781b" stroke-width="0.8"/>
        <rect x="-2.8" y="23.5" width="5.6" height="11" rx="1.8" fill="#8a4b28"/>
        <rect x="-2.8" y="26" width="5.6" height="1.5" fill="#6d3a1f"/>
        <rect x="-2.8" y="29.5" width="5.6" height="1.5" fill="#6d3a1f"/>
        <circle cx="0" cy="36" r="3.8" fill="url(#gold)" stroke="#b9781b" stroke-width="0.8"/>
        <circle cx="0" cy="36" r="1.5" fill="#d23b3b"/>
      </g>
    </g>
  </g>
</svg>
