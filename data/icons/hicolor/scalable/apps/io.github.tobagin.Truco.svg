<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8edf4"/>
    </linearGradient>
    <radialGradient id="gold" cx="0.4" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ffe6a0"/>
      <stop offset="0.6" stop-color="#f0b443"/>
      <stop offset="1" stop-color="#cf8a23"/>
    </radialGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8584f"/>
      <stop offset="1" stop-color="#bf2f2b"/>
    </linearGradient>
    <g id="espada">
      <path d="M0 -13 L2.6 -6 L2 8 L-2 8 L-2.6 -6 Z" fill="#3f74d6"/>
      <path d="M0 -13 L0 8 L-2 8 L-2.6 -6 Z" fill="#6f9bea"/>
      <rect x="-6.5" y="7" width="13" height="3" rx="1.5" fill="url(#gold)" stroke="#b9781b" stroke-width="0.5"/>
      <rect x="-1.3" y="9.5" width="2.6" height="5" rx="1" fill="#8a4b28"/>
    </g>
  </defs>

  <!-- fanned deck behind -->
  <g transform="rotate(-10 64 108)">
    <rect x="33" y="19" width="62" height="90" rx="8.5" fill="#cdd4e1"/>
    <rect x="34.2" y="20.2" width="59.6" height="87.6" rx="7.5" fill="url(#face)"/>
  </g>
  <g transform="rotate(9 64 108)">
    <rect x="33" y="19" width="62" height="90" rx="8.5" fill="#cdd4e1"/>
    <rect x="34.2" y="20.2" width="59.6" height="87.6" rx="7.5" fill="url(#face)"/>
  </g>

  <!-- top card: Rey de Espadas -->
  <g>
    <rect x="32" y="18" width="64" height="92" rx="9" fill="#cdd4e1"/>
    <rect x="33.2" y="19.2" width="61.6" height="89.6" rx="8" fill="url(#face)"/>

    <!-- corner suit pips -->
    <g transform="translate(43 31) scale(0.62)"><use href="#espada"/></g>
    <g transform="translate(85 97) rotate(180) scale(0.62)"><use href="#espada"/></g>

    <!-- crown -->
    <path d="M49 35 L53 23 L59 32 L64 21 L69 32 L75 23 L79 35 Z" fill="url(#gold)" stroke="#b9781b" stroke-width="1"/>
    <circle cx="53" cy="22.5" r="2.3" fill="#e85b52"/>
    <circle cx="64" cy="20.5" r="2.5" fill="#e85b52"/>
    <circle cx="75" cy="22.5" r="2.3" fill="#e85b52"/>
    <rect x="48" y="34" width="32" height="6" rx="2" fill="url(#gold)" stroke="#b9781b" stroke-width="1"/>
    <circle cx="64" cy="37" r="2" fill="#e85b52"/>

    <!-- head -->
    <circle cx="64" cy="51" r="9.2" fill="#edc7a1"/>
    <path d="M55 51 Q55 40 64 40 Q73 40 73 51 Q70 47 64 47 Q58 47 55 51 Z" fill="#7a4a2b"/>
    <path d="M57 54 Q64 64 71 54 Q71 60 64 61 Q57 60 57 54 Z" fill="#8a5a34"/>
    <circle cx="60.5" cy="50.5" r="1.2" fill="#3a2a1a"/>
    <circle cx="67.5" cy="50.5" r="1.2" fill="#3a2a1a"/>

    <!-- robe -->
    <path d="M49 64 Q64 56 79 64 L84 104 L44 104 Z" fill="url(#robe)"/>
    <path d="M49 64 Q64 56 79 64" stroke="url(#gold)" stroke-width="2.6" fill="none"/>
    <path d="M59 61 H69 L71 104 H57 Z" fill="#eef0f6"/>
    <path d="M59 61 H69" stroke="#cdd2dd" stroke-width="1" fill="none"/>
    <circle cx="64" cy="74" r="2" fill="#f0b443"/>
    <circle cx="64" cy="84" r="2" fill="#f0b443"/>
    <circle cx="64" cy="94" r="2" fill="#f0b443"/>
  </g>
</svg>
