app-id: io.github.tobagin.Truco.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: truco
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network

modules:
  - name: truco
    buildsystem: meson
    config-opts:
      - -Dprofile=development
    sources:
      - type: dir
        path: ..
    build-options:
      env:
        GST_PLUGIN_SYSTEM_PATH: /app/lib/gstreamer-1.0
    post-install:
      - glib-compile-schemas /app/share/glib-2.0/schemas
