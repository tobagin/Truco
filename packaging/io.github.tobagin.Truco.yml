app-id: io.github.tobagin.Truco
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: truco

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - /share/vala
  - /share/aclocal
  - /share/devhelp
  - '*.la'
  - '*.a'

modules:
  - name: truco
    buildsystem: meson
    config-opts:
      - -Dprofile=default
    build-options:
      env:
        GST_PLUGIN_SYSTEM_PATH: /app/lib/gstreamer-1.0
    sources:
      - type: git
        url: https://github.com/tobagin/Truco.git
        tag: v1.0.0
        commit: 3b2db399ece3f97a14819c6694bcd5679c26ee45
