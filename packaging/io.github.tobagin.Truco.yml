app-id: io.github.tobagin.Truco
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: truco
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/truco/cargo
    RUSTUP_HOME: /usr/lib/sdk/rust-stable

modules:
  - name: truco
    buildsystem: meson
    sources:
      - type: dir
        path: ../
    build-options:
      env:
        GST_PLUGIN_SYSTEM_PATH: /app/lib/gstreamer-1.0
