app-id: io.github.tobagin.Truco
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: truco
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/truco/cargo
    RUSTUP_HOME: /usr/lib/sdk/rust-stable

modules:
  - name: truco
    buildsystem: simple
    build-commands:
      # Install npm dependencies
      - npm install
      # Build the application
      - npm run tauri build -- --target release
      # Install binary
      - install -D src-tauri/target/release/truco /app/bin/truco
      # Install resources
      - install -D packaging/io.github.tobagin.Truco.desktop /app/share/applications/io.github.tobagin.Truco.desktop
      - install -D packaging/io.github.tobagin.Truco.metainfo.xml /app/share/metainfo/io.github.tobagin.Truco.metainfo.xml
      - install -D data/icons/hicolor/scalable/apps/io.github.tobagin.Truco.svg /app/share/icons/hicolor/scalable/apps/io.github.tobagin.Truco.svg
      - install -D data/icons/hicolor/symbolic/apps/io.github.tobagin.Truco-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.tobagin.Truco-symbolic.svg
    sources:
      - type: git
        url: https://github.com/tobagin/Truco.git
        branch: main
